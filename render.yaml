# Deploy Altis Cashflow on Render (frontend + Python API)
# Supabase hosts Postgres + Storage; Render hosts the app.
# https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: altis-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/upload_server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: uploads
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: altis-web
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://altis-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
